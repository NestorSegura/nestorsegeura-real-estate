# Nginx reverse proxy config for nestorsegura.com
# Copy to /etc/nginx/sites-available/ and symlink to sites-enabled/
#   sudo cp nginx/nestorsegura.com.conf /etc/nginx/sites-available/nestorsegura.com
#   sudo ln -s /etc/nginx/sites-available/nestorsegura.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then obtain SSL certificates:
#   Run: sudo certbot --nginx -d nestorsegura.com -d www.nestorsegura.com

# ---- HTTP → HTTPS redirect ---------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name nestorsegura.com www.nestorsegura.com;

    return 301 https://$host$request_uri;
}

# ---- HTTPS reverse proxy to Next.js ------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nestorsegura.com www.nestorsegura.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/nestorsegura.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nestorsegura.com/privkey.pem;

    # CRITICAL: disable buffering for Next.js streaming (SSE, Server Components)
    proxy_buffering off;

    location / {
        # Use 127.0.0.1 (not localhost) to avoid IPv6 resolution issues
        proxy_pass http://127.0.0.1:3000;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / HTTP upgrade support
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
